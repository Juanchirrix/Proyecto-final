# =============================================
# CONFIGURACIÓN DE LA APLICACIÓN - SGH
# Sistema de Gestión Hotelera
# =============================================

spring.application.name=SGH

# =============================================
# BASE DE DATOS - PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/sgh_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / HIBERNATE
# =============================================
# validate: valida el esquema contra las entidades (Flyway maneja la creación)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =============================================
# FLYWAY - MIGRACIONES AUTOMÁTICAS
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =============================================
# SERVIDOR
# =============================================
server.port=8080
server.servlet.context-path=/api

# =============================================
# LOGS
# =============================================
logging.level.com.acm.sgh=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
